name: Release to crates.io

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # needed to create the GitHub Release

jobs:
  publish:
    name: Test, verify tag, publish, release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can read CHANGELOG

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # rust-toolchain.toml pins channel + components automatically

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      # ── Sanity gate 1: the git tag must match Cargo.toml version ───────────
      # Catches the common mistake of tagging a commit whose Cargo.toml hasn't
      # been bumped (or vice-versa). Tag is read from GITHUB_REF (refs/tags/vX.Y.Z),
      # version from `cargo metadata` (one source of truth, no awk on Cargo.toml).
      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          manifest=$(cargo metadata --no-deps --format-version 1 \
                     | jq -r '.packages[] | select(.name=="heliosdb-nano") | .version')
          echo "tag:      $tag"
          echo "manifest: $manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag $tag does not match Cargo.toml version $manifest"
            exit 1
          fi

      # ── Sanity gate 2: tests pass on the tagged commit ─────────────────────
      # `--test-threads=2` matches typical GH-runner core count.
      # Skips:
      #   - `ha_tests::streaming_tests` — passes locally in <1 s but hangs
      #     ~10 min on the GH 2-CPU runner (TCP-port spin-wait under tight
      #     scheduling). Tracked separately; not a release-blocker.
      - name: Run tests (default features)
        run: |
          cargo test --locked -- \
            --test-threads=2 \
            --skip ha_tests::streaming_tests

      # ── Sanity gate 3: dry-run publish to catch metadata / packaging issues
      # before the real publish (real publish is irreversible — versions can be
      # yanked but never deleted).
      - name: cargo publish --dry-run
        run: cargo publish --dry-run --locked

      # ── The actual publish ────────────────────────────────────────────────
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

      # ── Create a GitHub Release with notes pulled from CHANGELOG.md ───────
      # Looks for a `## [X.Y.Z] - YYYY-MM-DD` heading and includes the body
      # up to the next `## ` heading.
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          notes=$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## / {exit}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="See CHANGELOG.md for details."
          fi
          {
            echo 'notes<<EOF'
            echo "$notes"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # e.g. v3.23.0-rc.1
