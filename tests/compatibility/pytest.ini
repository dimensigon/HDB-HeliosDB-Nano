[pytest]
# Test discovery patterns
testpaths = .
python_files = HELIOSDB_SQLITE_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    requires_server: requires HeliosDB server running
    integration: integration tests
    benchmark: performance benchmarks
    connection: connection-related tests
    execute: execute operation tests
    cursor: cursor operation tests
    datatype: data type preservation tests
    crud: CRUD operation tests
    join: JOIN and aggregation tests
    transaction: transaction handling tests
    error: error handling tests
    unicode: Unicode and encoding tests
    concurrent: concurrent access tests
    memory: in-memory mode tests

# Timeout settings
timeout = 300
timeout_method = thread

# Output options
console_output_style = progress
log_cli = false
log_cli_level = INFO

# Coverage options (when using pytest-cov)
# Uncomment to enable coverage by default
# addopts = --cov=. --cov-report=term-missing

# Parallel execution settings (when using pytest-xdist)
# Uncomment to enable parallel execution by default
# addopts = -n auto
