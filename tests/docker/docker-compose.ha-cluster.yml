# HeliosDB Nano HA Cluster - Docker Compose
# 4-node cluster: 1 primary + 3 standbys (one per sync mode) + 1 observer
#
# Standby sync modes:
#   - standby-sync:     sync mode     - transparent write routing (full sync)
#   - standby-semisync: semi-sync mode - transparent write routing
#   - standby-async:    async mode    - read-only (writes rejected)
#
# Usage:
#   docker compose -f docker-compose.ha-cluster.yml up -d
#   docker compose -f docker-compose.ha-cluster.yml logs -f
#   docker compose -f docker-compose.ha-cluster.yml down -v

networks:
  heliosdb-ha:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  primary-data:
  standby-sync-data:
  standby-semisync-data:
  standby-async-data:

services:
  # Primary node
  primary:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.ha
    container_name: heliosdb-primary
    hostname: primary
    networks:
      heliosdb-ha:
        ipv4_address: 172.28.1.1
    ports:
      - "15432:5432"  # Client connections (host port 15432)
      - "15433:5433"  # Replication
      - "18080:8080"  # HTTP API
    environment:
      HELIOSDB_ROLE: primary
      HELIOSDB_NODE_ID: 11111111-1111-1111-1111-111111111111
      HELIOSDB_DATA_DIR: /data
      HELIOSDB_LOG_LEVEL: info
      HELIOSDB_SYNC_MODE: semi-sync
      HELIOSDB_STANDBYS: standby1:5433,standby2:5433
      HELIOSDB_OBSERVER_HOSTS: observer:5433
    volumes:
      - primary-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Standby with SYNC mode (transparent write routing - full synchronization)
  standby-sync:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.ha
    container_name: heliosdb-standby-sync
    hostname: standby-sync
    networks:
      heliosdb-ha:
        ipv4_address: 172.28.1.2
    ports:
      - "15442:5432"  # Client connections (TWR: writes routed to primary)
      - "15443:5433"  # Replication
      - "18081:8080"  # HTTP API
    environment:
      HELIOSDB_ROLE: standby
      HELIOSDB_NODE_ID: 22222222-2222-2222-2222-222222222222
      HELIOSDB_DATA_DIR: /data
      HELIOSDB_LOG_LEVEL: info
      HELIOSDB_PRIMARY_HOST: primary:5433
      HELIOSDB_PRIMARY_PG_PORT: 5432
      HELIOSDB_SYNC_MODE: sync
    volumes:
      - standby-sync-data:/data
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Standby with SEMI-SYNC mode (transparent write routing)
  standby-semisync:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.ha
    container_name: heliosdb-standby-semisync
    hostname: standby-semisync
    networks:
      heliosdb-ha:
        ipv4_address: 172.28.1.3
    ports:
      - "15452:5432"  # Client connections (TWR: writes routed to primary)
      - "15453:5433"  # Replication
      - "18082:8080"  # HTTP API
    environment:
      HELIOSDB_ROLE: standby
      HELIOSDB_NODE_ID: 33333333-3333-3333-3333-333333333333
      HELIOSDB_DATA_DIR: /data
      HELIOSDB_LOG_LEVEL: info
      HELIOSDB_PRIMARY_HOST: primary:5433
      HELIOSDB_PRIMARY_PG_PORT: 5432
      HELIOSDB_SYNC_MODE: semi-sync
    volumes:
      - standby-semisync-data:/data
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Standby with ASYNC mode (traditional read-only - writes rejected)
  standby-async:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.ha
    container_name: heliosdb-standby-async
    hostname: standby-async
    networks:
      heliosdb-ha:
        ipv4_address: 172.28.1.5
    ports:
      - "15462:5432"  # Client connections (read-only, writes rejected)
      - "15463:5433"  # Replication
      - "18084:8080"  # HTTP API
    environment:
      HELIOSDB_ROLE: standby
      HELIOSDB_NODE_ID: 55555555-5555-5555-5555-555555555555
      HELIOSDB_DATA_DIR: /data
      HELIOSDB_LOG_LEVEL: info
      HELIOSDB_PRIMARY_HOST: primary:5433
      HELIOSDB_SYNC_MODE: async
    volumes:
      - standby-async-data:/data
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Observer (witness for split-brain protection)
  observer:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.ha
    container_name: heliosdb-observer
    hostname: observer
    networks:
      heliosdb-ha:
        ipv4_address: 172.28.1.4
    ports:
      - "15473:5433"  # Observer port
      - "18083:8080"  # HTTP API
    environment:
      HELIOSDB_ROLE: observer
      HELIOSDB_NODE_ID: 44444444-4444-4444-4444-444444444444
      HELIOSDB_LOG_LEVEL: info
      HELIOSDB_PRIMARY_HOST: primary:5433
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # HeliosProxy - Connection router and load balancer
  proxy:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.ha
    container_name: heliosdb-proxy
    hostname: proxy
    networks:
      heliosdb-ha:
        ipv4_address: 172.28.1.10
    ports:
      - "15400:5432"   # Client connections (main entry point) - use 15400 to avoid conflicts
      - "19090:9090"   # Admin API
    environment:
      HELIOSDB_ROLE: proxy
      HELIOSDB_LOG_LEVEL: info
    entrypoint: ["/usr/local/bin/heliosdb-proxy"]
    command:
      - "--listen"
      - "0.0.0.0:5432"
      - "--admin"
      - "0.0.0.0:9090"
      - "--primary"
      - "primary:5432"
      - "--standby"
      - "standby-sync:5432"
      - "--standby"
      - "standby-semisync:5432"
      - "--standby"
      - "standby-async:5432"
      - "--tr"
    depends_on:
      primary:
        condition: service_healthy
      standby-sync:
        condition: service_healthy
      standby-semisync:
        condition: service_healthy
      standby-async:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Test runner container (for running integration tests)
  test-runner:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.ha
    container_name: heliosdb-test-runner
    hostname: test-runner
    networks:
      heliosdb-ha:
        ipv4_address: 172.28.1.100
    environment:
      HELIOSDB_PRIMARY_HOST: primary:5432
      HELIOSDB_STANDBY_SYNC_HOST: standby-sync:5432
      HELIOSDB_STANDBY_SEMISYNC_HOST: standby-semisync:5432
      HELIOSDB_STANDBY_ASYNC_HOST: standby-async:5432
    volumes:
      - ../../tests:/tests:ro
    entrypoint: ["/bin/bash", "-c", "sleep infinity"]
    depends_on:
      primary:
        condition: service_healthy
      standby-sync:
        condition: service_healthy
      standby-semisync:
        condition: service_healthy
      standby-async:
        condition: service_healthy
