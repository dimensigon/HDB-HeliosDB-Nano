# =============================================================================
# HEALTH CHECK CONFIGURATION
# =============================================================================
# Global healthcheck settings are defined per service above

# =============================================================================
# DEPLOYMENT NOTES
# =============================================================================
#
# 1. Pre-deployment:
#    - Create required directories: /var/lib/heliosdb/data, /backups/heliosdb, /etc/heliosdb
#    - Copy production.toml to /etc/heliosdb/
#    - Generate SSL certificates to /etc/heliosdb/ssl/
#    - Create .env file with secrets (HELIOSDB_ENCRYPTION_KEY, HELIOSDB_JWT_SECRET, etc.)
#
# 2. Start services:
#    docker-compose -f PHASE_3_DOCKER_COMPOSE.yml up -d
#
# 3. Verify deployment:
#    docker-compose -f PHASE_3_DOCKER_COMPOSE.yml ps
#    docker-compose -f PHASE_3_DOCKER_COMPOSE.yml logs -f heliosdb-primary
#
# 4. Access services:
#    - Application API: http://localhost:8080
#    - PostgreSQL: postgresql://localhost:5432
#    - Grafana: http://localhost:3000
#    - Prometheus: http://localhost:9092
#    - AlertManager: http://localhost:9093
#
# 5. Monitoring:
#    - Import Grafana dashboards from ./monitoring/grafana/dashboards/
#    - Configure alert routes in ./monitoring/alertmanager/alertmanager.yml
#
# 6. Backup verification:
#    docker-compose -f PHASE_3_DOCKER_COMPOSE.yml exec heliosdb-backup ls -lh /backups
#
# 7. Scale standby replicas (optional):
#    docker-compose -f PHASE_3_DOCKER_COMPOSE.yml up -d --scale heliosdb-standby=3
#
# =============================================================================
