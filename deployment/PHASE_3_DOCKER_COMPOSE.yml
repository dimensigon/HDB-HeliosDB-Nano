# HeliosDB-Lite Phase 3: Production Docker Compose Configuration
# Version: 3.0.1
# Last Updated: December 8, 2025
#
# This Docker Compose configuration provides a production-ready deployment
# of HeliosDB-Lite with monitoring, backups, and high availability.

version: '3.8'

# Production networks
networks:
  heliosdb_frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  heliosdb_backend:
    driver: bridge
    internal: true  # Isolate backend from external access
    ipam:
      config:
        - subnet: 172.20.1.0/24
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.2.0/24

# Production volumes
volumes:
  heliosdb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/heliosdb/data
  heliosdb_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /backups/heliosdb
  heliosdb_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /etc/heliosdb
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local

services:
  # =============================================================================
  # PRIMARY APPLICATION + DATABASE
  # =============================================================================
  heliosdb-primary:
    image: heliosdb/lite:3.0.1
    container_name: heliosdb-primary
    hostname: heliosdb-primary
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: 3.0.1
    restart: unless-stopped
    networks:
      - heliosdb_frontend
      - heliosdb_backend
      - monitoring
    ports:
      - "5432:5432"  # PostgreSQL protocol
      - "8080:8080"  # HTTP API
      - "9090:9090"  # Prometheus metrics
    volumes:
      - heliosdb_data:/var/lib/heliosdb/data
      - heliosdb_config:/etc/heliosdb:ro
      - heliosdb_backups:/backups
      - /var/log/heliosdb:/var/log/heliosdb
    environment:
      # Application settings
      - HELIOSDB_MODE=server
      - HELIOSDB_DATA_DIR=/var/lib/heliosdb/data
      - HELIOSDB_CONFIG=/etc/heliosdb/production.toml
      - HELIOSDB_LOG_LEVEL=info
      - RUST_BACKTRACE=1

      # Server settings
      - HELIOSDB_LISTEN_ADDR=0.0.0.0
      - HELIOSDB_PG_PORT=5432
      - HELIOSDB_REST_PORT=8080
      - HELIOSDB_METRICS_PORT=9090
      - HELIOSDB_MAX_CONNECTIONS=500

      # Security (load from .env file)
      - HELIOSDB_ENCRYPTION_KEY=${HELIOSDB_ENCRYPTION_KEY}
      - HELIOSDB_JWT_SECRET=${HELIOSDB_JWT_SECRET}
      - HELIOSDB_TLS_CERT=/etc/heliosdb/ssl/cert.pem
      - HELIOSDB_TLS_KEY=/etc/heliosdb/ssl/key.pem

      # Performance
      - HELIOSDB_CACHE_SIZE_MB=4096  # 4 GB cache
      - HELIOSDB_WORKER_THREADS=8
      - HELIOSDB_ENABLE_SIMD=true

      # Backup settings
      - HELIOSDB_BACKUP_ENABLED=true
      - HELIOSDB_BACKUP_DIR=/backups
      - HELIOSDB_WAL_ARCHIVE_DIR=/backups/wal-archive
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

  # =============================================================================
  # STANDBY/REPLICA (Read-only)
  # =============================================================================
  heliosdb-standby:
    image: heliosdb/lite:3.0.1
    container_name: heliosdb-standby
    hostname: heliosdb-standby
    restart: unless-stopped
    networks:
      - heliosdb_backend
      - monitoring
    ports:
      - "5433:5432"  # PostgreSQL on different port
      - "8081:8080"  # HTTP API
      - "9091:9090"  # Metrics
    volumes:
      - /var/lib/heliosdb/standby:/var/lib/heliosdb/data:ro
      - heliosdb_config:/etc/heliosdb:ro
      - /var/log/heliosdb-standby:/var/log/heliosdb
    environment:
      - HELIOSDB_MODE=server
      - HELIOSDB_DATA_DIR=/var/lib/heliosdb/data
      - HELIOSDB_CONFIG=/etc/heliosdb/standby.toml
      - HELIOSDB_LOG_LEVEL=info
      - HELIOSDB_READ_ONLY=true  # Read-only mode
      - HELIOSDB_PG_PORT=5432
      - HELIOSDB_REST_PORT=8080
      - HELIOSDB_METRICS_PORT=9090
      - HELIOSDB_ENCRYPTION_KEY=${HELIOSDB_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # =============================================================================
  # BACKUP SERVICE
  # =============================================================================
  heliosdb-backup:
    image: heliosdb/backup:3.0.1
    container_name: heliosdb-backup
    hostname: heliosdb-backup
    restart: unless-stopped
    networks:
      - heliosdb_backend
    volumes:
      - heliosdb_data:/var/lib/heliosdb/data:ro
      - heliosdb_backups:/backups
      - ./scripts/backup:/scripts:ro
    environment:
      - BACKUP_SCHEDULE=0 0 * * *  # Daily at midnight
      - BACKUP_RETENTION_DAYS=7
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY:-}
    command: crond -f -l 2
    healthcheck:
      test: ["CMD", "test", "-f", "/backups/latest.tar.gz"]
      interval: 6h
      timeout: 30s
      retries: 2
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # =============================================================================
  # PROMETHEUS (Metrics Collection)
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: heliosdb-prometheus
    hostname: prometheus
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9092:9090"  # Prometheus UI
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # =============================================================================
  # NODE EXPORTER (System Metrics)
  # =============================================================================
  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: heliosdb-node-exporter
    hostname: node-exporter
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # ALERTMANAGER (Alert Routing)
  # =============================================================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: heliosdb-alertmanager
    hostname: alertmanager
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # =============================================================================
  # GRAFANA (Visualization)
  # =============================================================================
  grafana:
    image: grafana/grafana:10.0.0
    container_name: heliosdb-grafana
    hostname: grafana
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=false
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # =============================================================================
  # NGINX (Reverse Proxy / Load Balancer)
  # =============================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: heliosdb-nginx
    hostname: nginx
    restart: unless-stopped
    networks:
      - heliosdb_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/heliosdb/ssl:/etc/nginx/ssl:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - heliosdb-primary
      - heliosdb-standby
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # =============================================================================
  # OPTIONAL: LOKI (Log Aggregation)
  # =============================================================================
  # loki:
  #   image: grafana/loki:2.9.0
  #   container_name: heliosdb-loki
